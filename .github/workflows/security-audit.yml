name: Security Audit

on:
  schedule:
    - cron: '0 6 * * 1'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Production license scan
        run: |
          npx license-checker --production \
            --failOn "GPL-3.0;AGPL-3.0;PolyForm-Noncommercial-1.0.0"

      - name: Capture outdated report
        run: npm outdated --json > outdated-report.json || true

      - name: Upload outdated report
        uses: actions/upload-artifact@v4
        with:
          name: outdated-report
          path: outdated-report.json
